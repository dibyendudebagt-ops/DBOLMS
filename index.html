<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBOLMS - Official LMS App</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --primary: #007bff; --premium: #ffc107; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; }
        .nav-btn.active { background: var(--primary); color: white; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .action-btn { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .course-img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #eee; }
        .quiz-item { border-top: 1px solid #eee; padding: 15px 0; margin-top: 10px; }
        .opt-btn { width: 48%; display: inline-block; background: #6c757d; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
        .premium-box { background: #fff3cd; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <button id="btnStud" class="nav-btn active" onclick="switchTab('student')">Student View</button>
        <button id="btnTeach" class="nav-btn" onclick="switchTab('teacher')">Teacher Panel</button>
    </div>

    <div id="tabStudent">
        <div class="card">
            <h2>Lessons & Quizzes</h2>
            <div id="courseContainer">Loading courses...</div>
            <div id="quizList">Loading quizzes...</div>
        </div>

        <div class="card premium-box">
            <h3>💎 Unlock Premium Content</h3>
            <a href="upi://pay?pa=9612032475@ptsbi&pn=DBOLMS&cu=INR" class="action-btn" style="background:var(--success); text-decoration:none; display:block; text-align:center; margin-bottom:15px;">
                Pay via UPI App
            </a>
            <p style="font-size:12px; color:#666;">Step 1: Pay first. Step 2: Enter Email & UTR below.</p>
            <input type="email" id="payEmail" placeholder="Your Email Address">
            <input type="text" id="payUTR" placeholder="12-Digit UTR Number">
            <button class="action-btn" id="verifyBtn" onclick="processPayment()">Verify Payment & Send OTP</button>
        </div>
    </div>

    <div id="tabTeacher" class="hidden">
        <div id="teacherLoginDiv" class="card">
            <h2>Teacher Login</h2>
            <input type="email" id="tEmail" placeholder="Admin Email">
            <input type="password" id="tPass" placeholder="Password">
            <button class="action-btn" onclick="teacherLogin()">Login</button>
        </div>

        <div id="teacherDashDiv" class="hidden">
            <div class="card">
                <h3>Add Course (GitHub PNG)</h3>
                <input type="text" id="cTitle" placeholder="Course Title">
                <input type="text" id="cImgUrl" placeholder="GitHub PNG Link">
                <button class="action-btn" style="background:var(--success)" onclick="addCourse()">Upload Course</button>
            </div>
            <div class="card">
                <h3>Add New Quiz</h3>
                <input type="text" id="qText" placeholder="Question">
                <input type="text" id="qOpt1" placeholder="Option 1">
                <input type="text" id="qOpt2" placeholder="Option 2">
                <input type="text" id="qAns" placeholder="Correct Answer">
                <button class="action-btn" style="background:var(--success)" onclick="addQuiz()">Upload Quiz</button>
            </div>
            <button onclick="auth.signOut(); location.reload();">Logout</button>
        </div>
    </div>

    <div id="viewOTP" class="hidden card">
        <h2>Enter OTP</h2>
        <p>A 6-digit code was sent to your email.</p>
        <input type="number" id="otpInput" placeholder="Enter OTP">
        <button class="action-btn" onclick="unlockPremium()">Unlock Premium</button>
    </div>

    <div id="viewPremium" class="hidden card">
        <h2 style="color:var(--premium)">Premium Resource Vault</h2>
        <div id="pdfList"></div>
        <button class="action-btn" onclick="location.reload()" style="background:#dc3545">Lock & Exit</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAnCKeq1X-ml3oHWEVXcbIKflnC3hBEaMM",
    authDomain: "dbolms.firebaseapp.com",
    databaseURL: "https://dbolms-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbolms",
    storageBucket: "dbolms.firebasestorage.app",
    messagingSenderId: "41869582709",
    appId: "1:41869582709:web:34faa1737997f723cb333c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
emailjs.init("Tji-49rYlxrXApwqe");

function switchTab(tab) {
    document.getElementById('tabStudent').classList.toggle('hidden', tab !== 'student');
    document.getElementById('tabTeacher').classList.toggle('hidden', tab !== 'teacher');
    document.getElementById('btnStud').classList.toggle('active', tab === 'student');
    document.getElementById('btnTeach').classList.toggle('active', tab === 'teacher');
}

// --- TEACHER ACTIONS ---
function teacherLogin() {
    auth.signInWithEmailAndPassword(document.getElementById('tEmail').value, document.getElementById('tPass').value)
    .then(() => {
        document.getElementById('teacherLoginDiv').classList.add('hidden');
        document.getElementById('teacherDashDiv').classList.remove('hidden');
    }).catch(err => alert(err.message));
}

function addCourse() {
    let url = document.getElementById('cImgUrl').value;
    if (url.includes("github.com") && !url.includes("raw.githubusercontent.com")) {
        url = url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
    }
    db.ref('courses').push({ title: document.getElementById('cTitle').value, img: url })
    .then(() => alert("Course Uploaded!"));
}

function addQuiz() {
    db.ref('quizzes').push({
        q: document.getElementById('qText').value,
        options: [document.getElementById('qOpt1').value, document.getElementById('qOpt2').value],
        answer: document.getElementById('qAns').value
    }).then(() => alert("Quiz Added!"));
}

// --- STUDENT SYNC ---
db.ref('courses').on('value', snap => {
    const cont = document.getElementById('courseContainer');
    cont.innerHTML = "";
    snap.forEach(child => {
        const item = child.val();
        let displayImg = item.img;
        if (displayImg.includes("github.com") && !displayImg.includes("raw.githubusercontent.com")) {
            displayImg = displayImg.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
        }
        cont.innerHTML += `<div><h3>${item.title}</h3><img src="${displayImg}" class="course-img"></div>`;
    });
});

db.ref('quizzes').on('value', snap => {
    const list = document.getElementById('quizList');
    list.innerHTML = "";
    snap.forEach(child => {
        const item = child.val();
        list.innerHTML += `<div class="quiz-item"><p><strong>Q:</strong> ${item.q}</p>
            <button class="opt-btn" onclick="check('${item.options[0]}','${item.answer}')">${item.options[0]}</button>
            <button class="opt-btn" onclick="check('${item.options[1]}','${item.answer}')">${item.options[1]}</button>
        </div>`;
    });
});

function check(u, a) {
    if(u.trim().toLowerCase() === a.trim().toLowerCase()) alert("Correct!");
    else alert("Incorrect");
}

// --- UPDATED PAYMENT LOGIC (Payment -> Email) ---
async function processPayment() {
    const email = document.getElementById('payEmail').value;
    const utr = document.getElementById('payUTR').value;
    const btn = document.getElementById('verifyBtn');

    if(!email || utr.length < 12) return alert("Please enter a valid email and 12-digit UTR.");

    btn.disabled = true;
    btn.innerText = "Verifying...";

    // 1. Logic: Payment (UTR) happened in the past, Email entry is NOW.
    // In a production app, utrTime would come from your bank statement DB.
    // For this flow, we simulate that payment happened 2 minutes ago.
    const utrTime = Date.now() - (2 * 60 * 1000); 
    const emailTime = Date.now();

    // Verification: Payment must have happened BEFORE or at the same time as email entry
    if (utrTime > emailTime) {
        alert("Invalid sequence: Payment record cannot be in the future.");
        btn.disabled = false; return;
    }

    const utrSnap = await db.ref('used_utr/' + utr).once('value');
    if(utrSnap.exists()) {
        alert("This UTR has already been claimed.");
        btn.disabled = false; return;
    }

    const otp = Math.floor(100000 + Math.random() * 900000).toString();
    const emailKey = email.replace(/\./g, ',');

    await db.ref('active_access/' + emailKey).set({ otp, utr, requestTime: emailTime });
    await db.ref('used_utr/' + utr).set({ email, paymentTime: utrTime });

    emailjs.send('service_rand3au', 'template_tvjg21i', { email, passcode: otp })
    .then(() => {
        alert("Payment verified! OTP sent to " + email);
        document.getElementById('tabStudent').classList.add('hidden');
        document.getElementById('viewOTP').classList.remove('hidden');
    });
}

async function unlockPremium() {
    const emailKey = document.getElementById('payEmail').value.replace(/\./g, ',');
    const snap = await db.ref('active_access/' + emailKey).once('value');
    if(snap.exists() && snap.val().otp === document.getElementById('otpInput').value) {
        document.getElementById('viewOTP').classList.add('hidden');
        document.getElementById('viewPremium').classList.remove('hidden');
        db.ref('premium_pdfs').on('value', s => {
            const list = document.getElementById('pdfList'); list.innerHTML = "";
            s.forEach(c => list.innerHTML += `<a href="${c.val().url}" target="_blank" class="action-btn" style="display:block; text-decoration:none;">📄 ${c.val().title}</a>`);
        });
    } else alert("Invalid OTP");
}
</script>
</body>
</html>
