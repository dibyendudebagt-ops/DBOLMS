<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBOLMS - Professional Integrated System</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --primary: #007bff; --premium: #ffc107; --dark: #343a40; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; }
        .nav-btn.active { background: var(--primary); color: white; }
        
        h2 { color: var(--primary); margin-top: 0; }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .action-btn { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        
        /* Quiz Styling */
        .quiz-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .opt-btn { width: 48%; display: inline-block; background: #6c757d; color: white; font-size: 14px; border: none; cursor: pointer; }
        
        /* Premium/Admin boxes */
        .premium-box { background: #fff3cd; border: 1px solid #ffeeba; }
        .admin-box { border-left: 5px solid var(--dark); background: #e9ecef; }
        .pdf-link { display: block; background: white; padding: 15px; margin: 10px 0; border-radius: 8px; text-decoration: none; color: #333; font-weight: bold; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <button id="btnStud" class="nav-btn active" onclick="switchTab('student')">Student View</button>
        <button id="btnTeach" class="nav-btn" onclick="switchTab('teacher')">Teacher Panel</button>
    </div>

    <div id="tabStudent">
        <div class="card">
            <h2>Current Lessons</h2>
            <div id="quizList">Connecting to database...</div>
        </div>

        <div class="card premium-box">
            <h3>Descriptive Answers (Premium)</h3>
            <p>Pay via UPI: <strong>9612032475@ptsbi</strong></p>
            <input type="email" id="payEmail" placeholder="Email for Access Code">
            <input type="text" id="payUTR" placeholder="12-Digit UTR Number">
            <button class="action-btn" id="verifyBtn" onclick="processPayment()">Verify Payment & Get OTP</button>
        </div>
    </div>

    <div id="tabTeacher" class="hidden">
        <div id="teacherLoginDiv" class="card">
            <h2>Teacher Authentication</h2>
            <input type="email" id="tEmail" placeholder="Admin Email">
            <input type="password" id="tPass" placeholder="Password">
            <button class="action-btn" onclick="teacherLogin()">Login to Manage</button>
        </div>

        <div id="teacherDashDiv" class="hidden">
            <div class="card admin-box">
                <h2>Add New Quiz</h2>
                <input type="text" id="qText" placeholder="Question">
                <input type="text" id="qOpt1" placeholder="Option 1">
                <input type="text" id="qOpt2" placeholder="Option 2">
                <input type="text" id="qAns" placeholder="Correct Answer (Exact match)">
                <button class="action-btn" style="background:#28a745" onclick="addQuiz()">Upload Quiz</button>
            </div>

            <div class="card admin-box">
                <h2>Upload Premium PDF Link</h2>
                <input type="text" id="pdfTitle" placeholder="Document Title (e.g. Unit 1 Notes)">
                <input type="text" id="pdfUrl" placeholder="Google Drive / Firebase Link">
                <button class="action-btn" style="background:#28a745" onclick="addPDF()">Add Premium Content</button>
            </div>
            <button onclick="auth.signOut(); location.reload();">Logout</button>
        </div>
    </div>

    <div id="viewOTP" class="hidden">
        <div class="card">
            <h2>Check Your Email</h2>
            <p>Enter the 6-digit code sent to your inbox.</p>
            <input type="number" id="otpInput" placeholder="Enter OTP">
            <button class="action-btn" onclick="unlockPremium()">Unlock Premium Content</button>
        </div>
    </div>

    <div id="viewPremium" class="hidden">
        <div class="card" style="border: 2px solid var(--premium)">
            <h2 style="color: #856404;">💎 Premium Resource Vault</h2>
            <div id="pdfList"></div>
            <button class="action-btn" onclick="location.reload()" style="background:#dc3545">Lock Dashboard</button>
        </div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyAnCKeq1X-ml3oHWEVXcbIKflnC3hBEaMM",
    authDomain: "dbolms.firebaseapp.com",
    databaseURL: "https://dbolms-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbolms",
    storageBucket: "dbolms.firebasestorage.app",
    messagingSenderId: "41869582709",
    appId: "1:41869582709:web:34faa1737997f723cb333c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
emailjs.init("Tji-49rYlxrXApwqe");

// --- NAVIGATION LOGIC ---
function switchTab(tab) {
    document.getElementById('tabStudent').classList.toggle('hidden', tab !== 'student');
    document.getElementById('tabTeacher').classList.toggle('hidden', tab !== 'teacher');
    document.getElementById('btnStud').classList.toggle('active', tab === 'student');
    document.getElementById('btnTeach').classList.toggle('active', tab === 'teacher');
}

// --- TEACHER ACTIONS ---
function teacherLogin() {
    const e = document.getElementById('tEmail').value;
    const p = document.getElementById('tPass').value;
    auth.signInWithEmailAndPassword(e, p).then(user => {
        document.getElementById('teacherLoginDiv').classList.add('hidden');
        document.getElementById('teacherDashDiv').classList.remove('hidden');
    }).catch(err => alert("Auth Failed: " + err.message));
}

function addQuiz() {
    const data = {
        q: document.getElementById('qText').value,
        options: [document.getElementById('qOpt1').value, document.getElementById('qOpt2').value],
        answer: document.getElementById('qAns').value
    };
    db.ref('quizzes').push(data).then(() => alert("Quiz Live!"));
}

function addPDF() {
    const data = {
        title: document.getElementById('pdfTitle').value,
        url: document.getElementById('pdfUrl').value
    };
    db.ref('premium_pdfs').push(data).then(() => alert("PDF Added to Premium Vault!"));
}

// --- STUDENT & AUTOMATION LOGIC ---
async function processPayment() {
    const email = document.getElementById('payEmail').value;
    const utr = document.getElementById('payUTR').value;
    const btn = document.getElementById('verifyBtn');

    if(!email || utr.length < 12) return alert("Valid Email and 12-digit UTR required.");

    btn.disabled = true;
    btn.innerText = "Checking UTR...";

    const snap = await db.ref('used_utr/' + utr).once('value');
    if(snap.exists()) {
        alert("UTR already used.");
        btn.disabled = false; return;
    }

    const otp = Math.floor(100000 + Math.random() * 900000).toString();
    const emailKey = email.replace(/\./g, ',');

    await db.ref('active_access/' + emailKey).set({ otp, utr });
    await db.ref('used_utr/' + utr).set({ email });

    emailjs.send('service_rand3au', 'template_tvjg21i', {
        email: email, passcode: otp 
    }).then(() => {
        alert("OTP Sent!");
        document.getElementById('tabStudent').classList.add('hidden');
        document.getElementById('viewOTP').classList.remove('hidden');
    });
}

async function unlockPremium() {
    const emailKey = document.getElementById('payEmail').value.replace(/\./g, ',');
    const inputOtp = document.getElementById('otpInput').value;
    
    const snap = await db.ref('active_access/' + emailKey).once('value');
    if(snap.exists() && snap.val().otp === inputOtp) {
        document.getElementById('viewOTP').classList.add('hidden');
        document.getElementById('viewPremium').classList.remove('hidden');
        loadPremium();
    } else { alert("Wrong Code"); }
}

// --- REAL-TIME DATA SYNC ---
db.ref('quizzes').on('value', snap => {
    const data = snap.val();
    const list = document.getElementById('quizList');
    list.innerHTML = "";
    for(let id in data) {
        list.innerHTML += `<div class="quiz-item"><p>${data[id].q}</p>
            <button class="opt-btn" onclick="check('${data[id].options[0]}','${data[id].answer}')">${data[id].options[0]}</button>
            <button class="opt-btn" onclick="check('${data[id].options[1]}','${data[id].answer}')">${data[id].options[1]}</button>
        </div>`;
    }
});

function loadPremium() {
    db.ref('premium_pdfs').on('value', snap => {
        const data = snap.val();
        const list = document.getElementById('pdfList');
        list.innerHTML = "";
        for(let id in data) {
            list.innerHTML += `<a href="${data[id].url}" target="_blank" class="pdf-link">📥 Download: ${data[id].title}</a>`;
        }
    });
}

function check(u, a) {
    if(u.trim().toLowerCase() === a.trim().toLowerCase()) alert("Correct!");
    else alert("Incorrect");
}
</script>
</body>
</html>
