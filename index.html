<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Simple LMS</title><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script><style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.container{padding:20px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin:5px 0}
.hidden{display:none}
</style></head><body><div class="container" id="loginPage">
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<select id="role">
<option value="teacher">Teacher</option>
<option value="student">Student</option>
</select>
<button onclick="login()">Login</button>
</div>
</div><div class="container" id="teacherDash" style="display:none;">
<h2>Teacher Dashboard</h2><div class="card">
<h3>Add Course</h3>
<input id="courseTitle" placeholder="Course Title">
<button onclick="addCourse()">Add</button>
</div><div class="card">
<h3>Add Quiz</h3>
<input id="q" placeholder="Question">
<input id="o1" placeholder="Option 1">
<input id="o2" placeholder="Option 2">
<input id="ans" placeholder="Answer">
<button onclick="addQuiz()">Add Quiz</button>
</div>
</div><div class="container" id="studentDash" style="display:none;">
<h2>Student Dashboard</h2><div class="card">
<h3>Courses</h3>
<ul id="courseList"></ul>
</div><div class="card">
<h3>Quiz</h3>
<div id="quizBox"></div>
</div>
</div><script>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnCKeq1X-ml3oHWEVXcbIKflnC3hBEaMM",
  authDomain: "dbolms.firebaseapp.com",
  databaseURL: "https://dbolms-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dbolms",
  storageBucket: "dbolms.firebasestorage.app",
  messagingSenderId: "41869582709",
  appId: "1:41869582709:web:34faa1737997f723cb333c",
  measurementId: "G-9R4Q8VG1P0"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let currentUser,role;

function login(){
  alert("Login clicked");  // 👈 put it here

  let email = val('email');
  let pass = val('password');
  role = document.getElementById('role').value;

  if(email === "admin" && pass === "admin2"){
    role = "teacher";
    showDash();
    return;
  }

  auth.signInWithEmailAndPassword(email, pass)
  .then(res=>{
    currentUser = res.user;
    showDash();
  })
  .catch(e=>alert(e.message));
}

  auth.signInWithEmailAndPassword(email, pass)
  .then(res=>{
    currentUser = res.user;
    showDash();
  })
  .catch(e=>alert(e.message));
}
 auth.signInWithEmailAndPassword(email,pass)
 .then(res=>{
   currentUser=res.user;
   showDash();
 })
 .catch(e=>alert(e.message));
}

function showDash(){
  document.getElementById('loginPage').style.display = "none";

  if(role === "teacher"){
    document.getElementById('teacherDash').style.display = "block";
    document.getElementById('studentDash').style.display = "none";
  } else {
    document.getElementById('studentDash').style.display = "block";
    document.getElementById('teacherDash').style.display = "none";
    loadCourses();
    loadQuiz();
  }
}

function addCourse(){
 let t=val('courseTitle');
 db.ref('courses').push({title:t});
}

function addQuiz(){
 let q=val('q');
 let o1=val('o1');
 let o2=val('o2');
 let a=val('ans');
 db.ref('quizzes').push({q,options:[o1,o2],answer:a});
}

function loadCourses(){
 db.ref('courses').on('value',snap=>{
   let data=snap.val()||{};
   courseList.innerHTML="";
   for(let i in data){
     let li=document.createElement('li');
     li.innerText=data[i].title;
     courseList.appendChild(li);
   }
 });
}

function loadQuiz(){
 db.ref('quizzes').on('value',snap=>{
   let data=snap.val()||{};
   quizBox.innerHTML="";

   for(let id in data){
     let d=data[id];
     let div=document.createElement('div');
     div.innerHTML=`<p>${d.q}</p>
     <button onclick="check('${d.options[0]}','${d.answer}')">${d.options[0]}</button>
     <button onclick="check('${d.options[1]}','${d.answer}')">${d.options[1]}</button>`;
     quizBox.appendChild(div);
   }
 });
}

function check(ans,correct){
 alert(ans==correct?"Correct":"Wrong");
}

function val(id){return document.getElementById(id).value}

</script></body>
</html>
