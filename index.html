<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LMS with Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 0; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="loginSection">
    <div class="card">
        <h2>LMS Login</h2>
        <input type="email" id="email" placeholder="Email (e.g., dibyendu.d82@tripura.gov.in)">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div class="container hidden" id="teacherDash">
    <div class="card">
        <h2>Teacher Dashboard</h2>
        <button onclick="logout()" style="background:#dc3545">Logout</button>
        <hr>
        <h3>Add Course</h3>
        <input id="courseTitle" placeholder="Course Title">
        <button onclick="addCourse()">Add Course</button>
    </div>
</div>

<div class="container hidden" id="studentDash">
    <div class="card">
        <h2>Student Dashboard</h2>
        <button onclick="logout()" style="background:#dc3545">Logout</button>
        <hr>
        <h3>Available Courses</h3>
        <ul id="courseList"></ul>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAnCKeq1X-ml3oHWEVXcbIKflnC3hBEaMM",
    authDomain: "dbolms.firebaseapp.com",
    databaseURL: "https://dbolms-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbolms",
    storageBucket: "dbolms.firebasestorage.app",
    messagingSenderId: "41869582709",
    appId: "1:41869582709:web:34faa1737997f723cb333c"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- Authentication Logic ---

function login() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            // Success! The onAuthStateChanged listener below will handle the rest
        })
        .catch((error) => {
            alert("Login Failed: " + error.message);
        });
}

function logout() {
    auth.signOut().then(() => {
        location.reload();
    });
}

// Monitor Auth State
auth.onAuthStateChanged(user => {
    if (user) {
        // User is signed in, now check their role in the database
        checkUserRole(user.uid);
    } else {
        showSection('loginSection');
    }
});

function checkUserRole(uid) {
    // This matches the structure in your screenshot
    db.ref('users/' + uid).once('value').then(snapshot => {
        const userData = snapshot.val();
        if (userData && userData.role === "admin") {
            showSection('teacherDash');
        } else {
            showSection('studentDash');
            loadCourses();
        }
    });
}

function showSection(id) {
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('teacherDash').classList.add('hidden');
    document.getElementById('studentDash').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

// --- Data Logic ---

function addCourse(){
    let t = document.getElementById('courseTitle').value;
    if(t) db.ref('courses').push({title:t}).then(() => alert("Course Added!"));
}

function loadCourses(){
    db.ref('courses').on('value', snap => {
        let data = snap.val() || {};
        const list = document.getElementById('courseList');
        list.innerHTML = "";
        for(let i in data){
            let li = document.createElement('li');
            li.innerText = data[i].title;
            list.appendChild(li);
        }
    });
}
</script>
</body>
</html>
