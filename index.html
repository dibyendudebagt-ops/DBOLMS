<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LMS - Live Sync</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 0; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        .hidden { display: none; }
        .quiz-item { border-bottom: 1px solid #eee; padding: 10px 0; margin-bottom: 10px; }
        .opt-btn { background: #6c757d; margin: 5px 0; width: 48%; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div id="navButtons">
        <button onclick="showView('student')">View as Student</button>
        <button onclick="showView('login')" style="background:#6c757d">Teacher Login</button>
    </div>

    <div id="studentDash">
        <div class="card">
            <h2>Student Dashboard</h2>
            <h3>Quizzes</h3>
            <div id="quizBox">Loading quizzes...</div>
        </div>
    </div>

    <div id="loginSection" class="hidden">
        <div class="card">
            <h2>Teacher Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <div id="teacherDash" class="hidden">
        <div class="card">
            <button onclick="logout()" style="background:#dc3545">Logout</button>
            <hr>
            <h3>Create New Quiz</h3>
            <input id="q" placeholder="Question">
            <input id="o1" placeholder="Option 1">
            <input id="o2" placeholder="Option 2">
            <input id="ans" placeholder="Correct Answer">
            <button onclick="addQuiz()" style="background:#28a745">Save Quiz</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAnCKeq1X-ml3oHWEVXcbIKflnC3hBEaMM",
    authDomain: "dbolms.firebaseapp.com",
    databaseURL: "https://dbolms-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbolms",
    storageBucket: "dbolms.firebasestorage.app",
    messagingSenderId: "41869582709",
    appId: "1:41869582709:web:34faa1737997f723cb333c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- Auth & Navigation ---
function showView(view) {
    document.getElementById('studentDash').classList.add('hidden');
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('teacherDash').classList.add('hidden');
    
    if(view === 'student') document.getElementById('studentDash').classList.remove('hidden');
    if(view === 'login') document.getElementById('loginSection').classList.remove('hidden');
}

function login() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
}

function logout() { auth.signOut().then(() => location.reload()); }

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('navButtons').classList.add('hidden');
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('studentDash').classList.add('hidden');
        document.getElementById('teacherDash').classList.remove('hidden');
    }
});

// --- TEACHER ACTIONS ---
function addQuiz() {
    const q = document.getElementById('q').value;
    const o1 = document.getElementById('o1').value;
    const o2 = document.getElementById('o2').value;
    const ans = document.getElementById('ans').value;

    if(!q || !ans) return alert("Fill all fields");

    db.ref('quizzes').push({
        q: q,
        options: [o1, o2],
        answer: ans
    }).then(() => {
        alert("Saved!");
        document.getElementById('q').value = ""; // Clear inputs
    });
}

// --- LIVE STUDENT DATA (The Fix) ---
// This runs globally so the student dashboard is always listening
db.ref('quizzes').on('value', snap => {
    const data = snap.val() || {};
    const box = document.getElementById('quizBox');
    box.innerHTML = ""; // Clear current list

    for(let id in data) {
        const item = data[id];
        const div = document.createElement('div');
        div.className = "quiz-item";
        div.innerHTML = `
            <p><strong>${item.q}</strong></p>
            <button class="opt-btn" onclick="check('${item.options[0]}','${item.answer}')">${item.options[0]}</button>
            <button class="opt-btn" onclick="check('${item.options[1]}','${item.answer}')">${item.options[1]}</button>
        `;
        box.appendChild(div);
    }
    
    if (Object.keys(data).length === 0) {
        box.innerHTML = "No quizzes available yet.";
    }
});

function check(val, ans) {
    alert(val === ans ? "Correct!" : "Wrong!");
}
</script>
</body>
</html>
