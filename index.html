<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBOLMS - Integrated Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-student { background: #007bff; color: white; }
        .btn-teacher { background: #6c757d; color: white; }
        h2 { color: #007bff; margin-top: 0; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .action-btn { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .premium-box { background: #fff3cd; border: 1px solid #ffeeba; }
        .quiz-item { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .opt-btn { width: 48%; display: inline-block; background: #6c757d; font-size: 14px; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-buttons">
        <button class="nav-btn btn-student" onclick="showView('studentDash')">View as Student</button>
        <button class="nav-btn btn-teacher" onclick="showView('teacherLogin')">Teacher Login</button>
    </div>

    <div id="teacherLogin" class="hidden">
        <div class="card">
            <h2>Teacher Login</h2>
            <input type="email" id="tEmail" placeholder="Email">
            <input type="password" id="tPass" placeholder="Password">
            <button class="action-btn" onclick="teacherLogin()">Login</button>
        </div>
    </div>

    <div id="studentDash">
        <div class="card">
            <h2>Quizzes & Lessons</h2>
            <div id="quizList">Loading quizzes...</div>
        </div>

        <div class="card premium-box">
            <h3>Descriptive Answers (Premium)</h3>
            <p>1. Pay via UPI to 👉: <strong>9612032475@ptsbi</strong></p>
            <input type="email" id="payEmail" placeholder="Your Email Address">
            <input type="text" id="payUTR" placeholder="12-Digit Transaction ID (UTR)">
            <button class="action-btn" id="verifyBtn" onclick="processPayment()">Verify & Get Access Code</button>
        </div>
    </div>

    <div id="otpSection" class="hidden">
        <div class="card">
            <h2>Enter Access Code</h2>
            <p>Check your email for the passcode.</p>
            <input type="number" id="otpInput" placeholder="Enter OTP">
            <button class="action-btn" onclick="unlockDashboard()">Unlock Now</button>
        </div>
    </div>

    <div id="premiumDash" class="hidden">
        <div class="card">
            <h2 style="color: #ffc107;">💎 Premium Downloads</h2>
            <div id="pdfList"></div>
            <button class="action-btn" onclick="location.reload()" style="background:#dc3545">Lock & Exit</button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyAnCKeq1X-ml3oHWEVXcbIKflnC3hBEaMM",
    authDomain: "dbolms.firebaseapp.com",
    databaseURL: "https://dbolms-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dbolms",
    storageBucket: "dbolms.firebasestorage.app",
    messagingSenderId: "41869582709",
    appId: "1:41869582709:web:34faa1737997f723cb333c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
emailjs.init("Tji-49rYlxrXApwqe"); // Your Public Key

// --- VIEW NAVIGATION ---
function showView(viewId) {
    const views = ['studentDash', 'teacherLogin', 'otpSection', 'premiumDash'];
    views.forEach(id => {
        document.getElementById(id).classList.add('hidden');
    });
    document.getElementById(viewId).classList.remove('hidden');
}

// --- TEACHER LOGIC ---
function teacherLogin() {
    const email = document.getElementById('tEmail').value;
    const pass = document.getElementById('tPass').value;
    auth.signInWithEmailAndPassword(email, pass)
        .then(() => alert("Logged in successfully! You can now add courses."))
        .catch(err => alert("Login Failed: " + err.message));
}

// --- AUTOMATION LOGIC ---
async function processPayment() {
    const email = document.getElementById('payEmail').value;
    const utr = document.getElementById('payUTR').value;
    const btn = document.getElementById('verifyBtn');

    if (!email || utr.length < 12) return alert("Enter valid email and 12-digit UTR.");

    btn.disabled = true;
    btn.innerText = "Verifying...";

    const utrSnap = await db.ref('used_utr/' + utr).once('value');
    if (utrSnap.exists()) {
        alert("This UTR has already been used.");
        btn.disabled = false;
        btn.innerText = "Verify & Get Access Code";
        return;
    }

    const otp = Math.floor(100000 + Math.random() * 900000).toString();
    const emailKey = email.replace(/\./g, ',');

    await db.ref('active_access/' + emailKey).set({ otp, utr, time: Date.now() });
    await db.ref('used_utr/' + utr).set({ email });

    emailjs.send('service_rand3au', 'template_tvjg21i', {
        email: email,       // Template variable {{email}}
        passcode: otp       // Template variable {{passcode}}
    }).then(() => {
        alert("OTP sent to your email!");
        showView('otpSection');
    }).catch(err => {
        alert("Email failed. Contact admin.");
        btn.disabled = false;
    });
}

async function unlockDashboard() {
    const emailKey = document.getElementById('payEmail').value.replace(/\./g, ',');
    const enteredOtp = document.getElementById('otpInput').value;

    const snap = await db.ref('active_access/' + emailKey).once('value');
    if (snap.exists() && snap.val().otp === enteredOtp) {
        showView('premiumDash');
        loadPremiumContent();
    } else {
        alert("Invalid Access Code.");
    }
}

// --- CONTENT LOADING ---
function loadPremiumContent() {
    db.ref('premium_pdfs').on('value', snap => {
        const data = snap.val() || {};
        const cont = document.getElementById('pdfList');
        cont.innerHTML = "";
        for(let id in data) {
            cont.innerHTML += `<a href="${data[id].url}" target="_blank" class="pdf-link">📄 ${data[id].title}</a>`;
        }
    });
}

// Load quizzes for Student Dashboard
db.ref('quizzes').on('value', snap => {
    const data = snap.val() || {};
    const div = document.getElementById('quizList');
    div.innerHTML = "";
    for(let id in data) {
        const item = data[id];
        div.innerHTML += `<div class="quiz-item"><p><strong>Q:</strong> ${item.q}</p>
            <button class="opt-btn" onclick="check('${item.options[0]}','${item.answer}')">${item.options[0]}</button>
            <button class="opt-btn" onclick="check('${item.options[1]}','${item.answer}')">${item.options[1]}</button>
        </div>`;
    }
});

function check(val, ans) {
    if (val.trim().toLowerCase() === ans.trim().toLowerCase()) {
        alert("🎉 Correct!");
    } else {
        alert("❌ Wrong!");
    }
}
</script>
</body>
</html>
