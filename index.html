<!DOCTYPE html><html>
<head>
  <meta charset="UTF-8">
  <title>Advanced LMS PRO</title>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>  <style>
    body { font-family: 'Segoe UI'; margin:0; background:#f4f6f9; }
    .container { padding:20px }
    .card { background:#fff; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1)}
    input,button,select { padding:10px; margin:5px 0; width:100%; border-radius:8px; border:1px solid #ccc }
    button { background:#4CAF50; color:#fff; border:none }
    .hidden { display:none }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px }
    .stat { color:#fff; padding:15px; border-radius:10px }
    .blue{background:#2196F3}.green{background:#4CAF50}.orange{background:#FF9800}
  </style></head><body><div class="container" id="loginPage">
  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <select id="role">
      <option value="admin">Admin</option>
      <option value="teacher">Teacher</option>
      <option value="student">Student</option>
    </select>
    <button onclick="login()">Login</button>
  </div>
</div><div class="container hidden" id="dashboard">
  <h2>Dashboard</h2>  <div class="grid">
    <div class="stat blue">Courses: <span id="courseCount">0</span></div>
    <div class="stat green">Users: <span id="userCount">0</span></div>
    <div class="stat orange">Results: <span id="resultCount">0</span></div>
  </div>  <div class="card">
    <h3>Create Course</h3>
    <input id="courseTitle" placeholder="Course Title">
    <button onclick="addCourse()">Add</button>
  </div>  <div class="card">
    <h3>Create Quiz</h3>
    <input id="quizQ" placeholder="Question">
    <input id="opt1" placeholder="Option 1">
    <input id="opt2" placeholder="Option 2">
    <input id="ans" placeholder="Correct Answer">
    <button onclick="addQuiz()">Add Quiz</button>
  </div>  <div class="card">
    <h3>Courses</h3>
    <ul id="courseList"></ul>
  </div>  <div class="card">
    <h3>Take Quiz</h3>
    <div id="quizBox"></div>
  </div>  <div class="card">
    <h3>Analytics</h3>
    <canvas id="chart"></canvas>
  </div>  <div class="card">
    <button onclick="exportExcel()">Export Results (Excel)</button>
  </div></div><script>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnCKeq1X-ml3oHWEVXcbIKflnC3hBEaMM",
  authDomain: "dbolms.firebaseapp.com",
  databaseURL: "https://dbolms-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dbolms",
  storageBucket: "dbolms.firebasestorage.app",
  messagingSenderId: "41869582709",
  appId: "1:41869582709:web:34faa1737997f723cb333c",
  measurementId: "G-9R4Q8VG1P0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;

function login(){
  let email = emailEl('email');
  let pass = emailEl('password');
  let role = document.getElementById('role').value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(res=>{
    currentUser = res.user;
    db.collection('users').doc(currentUser.uid).set({email, role});

    showDashboard();
  }).catch(e=>alert(e.message));
}

function showDashboard(){
  loginPage.classList.add('hidden');
  dashboard.classList.remove('hidden');
  loadData();
}

function addCourse(){
  let title = emailEl('courseTitle');
  db.collection('courses').add({title});
}

function addQuiz(){
  let q = emailEl('quizQ');
  let o1 = emailEl('opt1');
  let o2 = emailEl('opt2');
  let a = emailEl('ans');

  db.collection('quizzes').add({q, options:[o1,o2], answer:a});
}

function loadData(){

  db.collection('courses').onSnapshot(s=>{
    courseCount.innerText = s.size;
    courseList.innerHTML="";
    s.forEach(d=>{
      let li=document.createElement('li');
      li.innerText=d.data().title;
      courseList.appendChild(li);
    });
  });

  db.collection('users').onSnapshot(s=> userCount.innerText=s.size);
  db.collection('results').onSnapshot(s=> resultCount.innerText=s.size);

  loadQuiz();
}

function loadQuiz(){
  db.collection('quizzes').onSnapshot(s=>{
    quizBox.innerHTML="";
    s.forEach(doc=>{
      let d=doc.data();
      let div=document.createElement('div');
      div.innerHTML=`<p>${d.q}</p>
        <button onclick="submitQuiz('${doc.id}','${d.options[0]}')">${d.options[0]}</button>
        <button onclick="submitQuiz('${doc.id}','${d.options[1]}')">${d.options[1]}</button>`;
      quizBox.appendChild(div);
    });
  });
}

function submitQuiz(id, ans){
  db.collection('quizzes').doc(id).get().then(doc=>{
    let correct = doc.data().answer;
    let score = (ans==correct)?1:0;

    db.collection('results').add({user:currentUser.uid, score});
    alert('Score: '+score);
    drawChart();
  });
}

function drawChart(){
  db.collection('results').get().then(s=>{
    let total=s.size, pass=0;
    s.forEach(d=>{ if(d.data().score==1) pass++; });

    new Chart(document.getElementById('chart'),{
      type:'bar',
      data:{ labels:['Pass','Fail'], datasets:[{data:[pass,total-pass]}] }
    });
  });
}

function exportExcel(){
  db.collection('results').get().then(s=>{
    let data=[];
    s.forEach(d=> data.push(d.data()));
    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Results');
    XLSX.writeFile(wb, 'results.xlsx');
  });
}

function emailEl(id){ return document.getElementById(id).value }

</script></body>
</html>
